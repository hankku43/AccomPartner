server {
    listen 80;
    server_name accompartner.dev www.accompartner.dev;

    # Let's Encrypt 驗證挑戰路徑
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 強制將其他 HTTP 請求跳轉至 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name accompartner.dev www.accompartner.dev;

    ssl_certificate /etc/letsencrypt/live/accompartner.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accompartner.dev/privkey.pem;
    
    # 增強 SSL 安全設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

    # 上傳大小上限
    client_max_body_size 10M;

    # 1. 處理前端靜態資源 (Vue App)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 支持 Vue Router 的 History Mode (單頁應用程式)
        try_files $uri $uri/ /index.html;
    }

    # 2. 處理 API 請求反向代理 (轉發給後端 FastAPI 容器)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 放寬超時限制
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
