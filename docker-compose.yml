version: '3.8'

services:
  # 後端: FastAPI/PyTorch 服務 (內部連接埠 8000)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accompartner_backend
    restart: always
    environment:
      # ⚠️  安全性設定：請將下方的網址替換為您的實際前端網址（例如 http://your-server-ip 或 https://yourdomain.com）
      # 使用 * 代表允許任意來源跨域呼叫 API，在生產環境中具有安全風險。
      - MODEL_DIR=/app/app/resources
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}

    # 在 2GB RAM 機器上，我們不限制記憶體，全交由 Swap 處理 (否則 Docker 會主動 Kill 掉)
    volumes:
      # 為了不讓映像檔過於肥大，強烈建議將您本地的 .pth 模型檔直接放進以下對應目錄中
      # 等號左邊是宿主機路徑(需包含模型)，等號右邊是容器內系統路徑
      - ./backend/app/resources:/app/app/resources

  # 前端: Vue 靜態檔 + Nginx 反向代理 (公開連接埠 80 與 443)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accompartner_frontend
    restart: always
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend # 確保後端先啟動

  # Certbot: 處理 Let's Encrypt SSL 憑證簽發與自動更新
  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
